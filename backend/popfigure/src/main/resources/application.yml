spring:
  application:
    name: popfigure
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=perw;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.SQLServerDialect
  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:popfigure-jwt-secret-key-change-me-popfigure-jwt-secret-key-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.web: info
